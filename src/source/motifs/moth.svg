  <!-- Left antenna - upper -->
  <path d="M46,18 Q35,5 30,12" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Right antenna - upper -->
  <path d="M54,18 Q65,5 70,12" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Left antenna - lower (curled) -->
