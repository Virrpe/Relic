<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left upper wing -->
  <ellipse cx="28" cy="38" rx="22" ry="30" fill="white"/>
  
  <!-- Right upper wing -->
  <ellipse cx="72" cy="38" rx="22" ry="30" fill="white"/>
  
  <!-- Left lower wing -->
  <ellipse cx="32" cy="65" rx="18" ry="22" fill="white"/>
  
  <!-- Right lower wing -->
  <ellipse cx="68" cy="65" rx="18" ry="22" fill="white"/>
  
  <!-- Body - thorax -->
  <ellipse cx="50" cy="35" rx="8" ry="12" fill="white"/>
  
  <!-- Body - abdomen -->
