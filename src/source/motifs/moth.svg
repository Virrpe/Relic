  <!-- Left wing pattern - upper -->
  <ellipse cx="25" cy="35" rx="8" ry="12" fill="#ddd"/>
  
  <!-- Right wing pattern - upper -->
  <ellipse cx="75" cy="35" rx="8" ry="12" fill="#ddd"/>
  
  <!-- Left wing pattern - lower -->
  <ellipse cx="30" cy="62" rx="6" ry="8" fill="#ddd"/>
  
  <!-- Right wing pattern - lower -->
  <ellipse cx="70" cy="62" rx="6" ry="8" fill="#ddd"/>
  
  <!-- Eyes -->
  <circle cx="48" cy="21" r="2" fill="black"/>
  <circle cx="52" cy="21" r="2" fill="black"/>
