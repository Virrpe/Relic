<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Skull - cranium -->
  <ellipse cx="50" cy="40" rx="30" ry="28" fill="white"/>
  
  <!-- Skull - jaw -->
  <rect x="32" y="58" width="36" height="22" rx="5" fill="white"/>
  
  <!-- Eye sockets - left -->
  <ellipse cx="38" cy="40" rx="10" ry="12" fill="black"/>
  
  <!-- Eye sockets - right -->
  <ellipse cx="62" cy="40" rx="10" ry="12" fill="black"/>
  
  <!-- Nose cavity - triangular -->
  <polygon points="50,50 44,62 56,62" fill="black"/>
  
  <!-- Teeth lines - vertical -->
  <line x1="40" y1="60" x2="40" y2="78" stroke="black" stroke-width="2"/>
  <line x1="50" y1="60" x2="50" y2="78" stroke="black" stroke-width="2"/>
  <line x1="60" y1="60" x2="60" y2="78" stroke="black" stroke-width="2"/>
  
  <!-- Cheekbone indentations - left -->
  <ellipse cx="30" cy="52" rx="6" ry="4" fill="#ccc"/>
  
  <!-- Cheekbone indentations - right -->
  <ellipse cx="70" cy="52" rx="6" ry="4" fill="#ccc"/>
  
  <!-- Temple indentations - left -->
  <ellipse cx="25" cy="35" rx="5" ry="8" fill="#ddd"/>
  
  <!-- Temple indentations - right -->
  <ellipse cx="75" cy="35" rx="5" ry="8" fill="#ddd"/>
</svg>
